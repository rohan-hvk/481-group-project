<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dealer Hedging Simulator - Advanced Prototype</title>
    <script src="https://cdn.plot.ly/plotly-2.24.1.min.js"></script>
    <style>
        :root {
            --bg-main: #0d1117;
            --bg-panel: #161b22;
            --accent-green: #2ea043;
            --accent-red: #f85149;
            --text-main: #c9d1d9;
            --text-muted: #8b949e;
            --border: #30363d;
        }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; 
            background: var(--bg-main); 
            color: var(--text-main); 
            margin: 0; 
            padding: 20px;
            display: flex;
            gap: 20px;
            height: 95vh;
            box-sizing: border-box;
        }
        .panel { 
            background: var(--bg-panel); 
            border: 1px solid var(--border); 
            border-radius: 12px; 
            padding: 25px; 
            display: flex;
            flex-direction: column;
        }
        .left-panel { flex: 1; max-width: 350px; }
        .right-panel { flex: 2; overflow: hidden; }
        h2 { margin-top: 0; font-size: 1.2rem; color: #fff; border-bottom: 1px solid var(--border); padding-bottom: 15px;}
        .control-group { margin-top: 30px; }
        .control-group label { display: flex; justify-content: space-between; font-weight: 600; margin-bottom: 10px; font-size: 0.9rem;}
        .val-display { color: #58a6ff; }
        input[type=range] { 
            width: 100%; cursor: pointer; accent-color: #58a6ff; 
        }
        .metric-cards { display: flex; gap: 15px; margin-bottom: 20px; }
        .card { 
            flex: 1; background: #0d1117; border: 1px solid var(--border); 
            border-radius: 8px; padding: 15px; text-align: center;
        }
        .card-title { font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px;}
        .card-value { font-size: 1.8rem; font-weight: bold; margin-top: 8px; }
        .buy { color: var(--accent-green); }
        .sell { color: var(--accent-red); }
        .neutral { color: var(--text-main); }
        #chart { flex-grow: 1; width: 100%; min-height: 300px; }
    </style>
</head>
<body>
    <div class="panel left-panel">
        <h2>Market Parameters</h2>
        <div class="control-group">
            <label>Spot Price Move (Points) <span class="val-display" id="priceVal">0</span></label>
            <input type="range" id="spotSlider" min="-150" max="150" value="0" step="5">
        </div>
        <div class="control-group">
            <label>Implied Volatility Shock (%) <span class="val-display" id="volVal">0</span></label>
            <input type="range" id="volSlider" min="-20" max="50" value="0" step="1">
        </div>
        <div class="control-group">
            <label>Time to Expiry (Days) <span class="val-display" id="timeVal">30</span></label>
            <input type="range" id="timeSlider" min="1" max="90" value="30" step="1">
        </div>
    </div>
    
    <div class="panel right-panel">
        <h2>Dealer Hedging Engine</h2>
        <div class="metric-cards">
            <div class="card">
                <div class="card-title">Net Delta Exposure</div>
                <div class="card-value" id="netDelta">0</div>
            </div>
            <div class="card">
                <div class="card-title">Net Gamma Exposure</div>
                <div class="card-value" id="netGamma">0</div>
            </div>
            <div class="card" style="border-color: #58a6ff;">
                <div class="card-title">Required ES Hedge</div>
                <div class="card-value" id="hedgeOutput">Neutral</div>
            </div>
        </div>
        <div id="chart"></div>
    </div>

    <script>
        // Generate synthetic options chain data (Strikes from 4800 to 5600)
        const strikes = Array.from({length: 81}, (_, i) => 4800 + (i * 10)); 
        
        // Create a realistic bell-curve base profile for Gamma centered at 5200 (At-The-Money)
        const baseGammaCurve = strikes.map(strike => {
            let dist = Math.abs(strike - 5200);
            return Math.max(0, 1000 - (dist * dist * 0.015)); 
        });

        function updateDashboard() {
            let spotMove = parseFloat(document.getElementById('spotSlider').value);
            let volShock = parseFloat(document.getElementById('volSlider').value);
            let timeToExpiry = parseFloat(document.getElementById('timeSlider').value);

            // Format slider text
            document.getElementById('priceVal').innerText = spotMove > 0 ? "+" + spotMove : spotMove;
            document.getElementById('volVal').innerText = volShock > 0 ? "+" + volShock + "%" : volShock + "%";
            document.getElementById('timeVal').innerText = timeToExpiry;

            // Synthetic math: Simulate how volatility and time decay affect Gamma
            let timeMultiplier = Math.sqrt(30 / timeToExpiry); // Less time = higher peak ATM gamma
            let volMultiplier = 1 + (volShock / 100);
            
            let dynamicGammaCurve = baseGammaCurve.map(g => (g * volMultiplier * timeMultiplier));
            let netGamma = dynamicGammaCurve.reduce((a, b) => a + b, 0) / 100; // Scaled for UI
            
            // Delta calculation: Dealer starts slightly short Delta, and it changes via Gamma
            let baseNetDelta = -500; 
            let netDelta = baseNetDelta + (netGamma * spotMove); 
            let requiredHedge = -netDelta; // Dealers hedge the inverse of their exposure

            // Update UI Numbers
            document.getElementById('netDelta').innerText = netDelta.toFixed(0);
            document.getElementById('netGamma').innerText = netGamma.toFixed(0);

            let hedgeEl = document.getElementById('hedgeOutput');
            if (Math.abs(requiredHedge) < 50) {
                hedgeEl.innerText = "Neutral";
                hedgeEl.className = "card-value neutral";
            } else if (requiredHedge > 0) {
                hedgeEl.innerText = `BUY ${Math.abs(requiredHedge).toFixed(0)} ES`;
                hedgeEl.className = "card-value buy";
            } else {
                hedgeEl.innerText = `SELL ${Math.abs(requiredHedge).toFixed(0)} ES`;
                hedgeEl.className = "card-value sell";
            }

            // Update Visualization: Gamma Curve vs Spot Price
            let currentSpot = 5200 + spotMove;
            Plotly.react('chart', [
                {
                    x: strikes,
                    y: dynamicGammaCurve,
                    type: 'scatter',
                    mode: 'lines+fill',
                    fill: 'tozeroy',
                    line: {color: '#58a6ff', width: 2, shape: 'spline'},
                    fillcolor: 'rgba(88, 166, 255, 0.15)',
                    name: 'Gamma Profile'
                },
                {
                    x: [currentSpot, currentSpot],
                    y: [0, Math.max(...dynamicGammaCurve) * 1.1],
                    type: 'scatter',
                    mode: 'lines',
                    line: {color: '#f85149', width: 2, dash: 'dash'},
                    name: 'Current Spot Price'
                }
            ], {
                plot_bgcolor: 'rgba(0,0,0,0)', 
                paper_bgcolor: 'rgba(0,0,0,0)', 
                font: {color: '#c9d1d9'},
                title: {text: 'Dealer Gamma Exposure Profile', font: {size: 16}},
                xaxis: {title: 'S&P 500 Strike Price', gridcolor: '#30363d'},
                yaxis: {title: 'Gamma Exposure', gridcolor: '#30363d', showticklabels: false},
                margin: {t: 50, b: 50, l: 30, r: 30},
                showlegend: false,
                hovermode: 'x unified'
            });
        }

        // Attach event listeners to sliders
        document.getElementById('spotSlider').addEventListener('input', updateDashboard);
        document.getElementById('volSlider').addEventListener('input', updateDashboard);
        document.getElementById('timeSlider').addEventListener('input', updateDashboard);
        
        // Run once to paint initial state
        updateDashboard();
    </script>
</body>
</html>
